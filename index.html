<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>hs번역웹</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#fff;
  color:#111;
}

header{
  height:75px;
  border-bottom:2px solid #eee;
  display:flex;
  align-items:center;
  padding:0 20px;
}

.logo{
  font-size:32px;
  font-weight:900;
}

.wrap{
  max-width:1400px;
  margin:auto;
  padding:25px;
}

.title{
  font-size:50px;
  font-weight:900;
  margin-bottom:10px;
}

.sub{
  color:#666;
  margin-bottom:30px;
}

.boxes{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:20px;
  align-items:center;
}

.box{
  border:2px solid #ddd;
  border-radius:20px;
  padding:20px;
  min-height:500px;
}

select{
  width:100%;
  padding:16px;
  border:2px solid #ddd;
  border-radius:12px;
  background:#f8f8f8;
  font-size:17px;
  font-weight:bold;
  margin-bottom:20px;
}

textarea{
  width:100%;
  height:360px;
  border:none;
  outline:none;
  resize:none;
  font-size:22px;
}

.middle{
  display:flex;
  justify-content:center;
  align-items:center;
}

.swap{
  width:90px;
  height:90px;
  border:none;
  border-radius:50%;
  background:#111;
  color:white;
  font-size:38px;
  cursor:pointer;
}

.buttons{
  margin-top:25px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  padding:18px;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.translate{
  background:#111;
  color:white;
}

.copy{
  background:#333;
  color:white;
}

.status{
  margin-top:20px;
  color:#666;
}

@media(max-width:1000px){

  .boxes{
    grid-template-columns:1fr;
  }

  .middle{
    transform:rotate(90deg);
  }

  textarea{
    height:250px;
  }
}

</style>
</head>

<body>

<header>

<div class="logo">
hs번역웹
</div>

</header>

<div class="wrap">

<div class="title">
hs번역웹
</div>

<div class="sub">
무료 번역 웹사이트
</div>

<div class="boxes">

<div class="box">

<select id="from">

<option value="ko">한국어</option>
<option value="en">영어</option>
<option value="ja">일본어</option>
<option value="zh-CN">중국어</option>
<option value="fr">프랑스어</option>

</select>

<textarea
id="input"
placeholder="번역할 내용을 입력하세요"
></textarea>

</div>

<div class="middle">

<button
class="swap"
onclick="swapLang()"
>
⇄
</button>

</div>

<div class="box">

<select id="to">

<option value="en">영어</option>
<option value="ko">한국어</option>
<option value="ja">일본어</option>
<option value="zh-CN">중국어</option>
<option value="fr">프랑스어</option>

</select>

<textarea
id="output"
readonly
placeholder="번역 결과"
></textarea>

</div>

</div>

<div class="buttons">

<button
class="btn translate"
onclick="translateText()"
>
번역하기
</button>

<button
class="btn copy"
onclick="copyText()"
>
복사하기
</button>

</div>

<div
class="status"
id="status"
>
준비 완료
</div>

</div>

<script>

function swapLang(){

  const from =
    document.getElementById("from");

  const to =
    document.getElementById("to");

  let temp = from.value;

  from.value = to.value;
  to.value = temp;
}

async function translateText(){

  const text =
    document.getElementById("input").value;

  const output =
    document.getElementById("output");

  const status =
    document.getElementById("status");

  if(text.trim() === ""){

    alert("내용 입력");
    return;
  }

  const from =
    document.getElementById("from").value;

  const to =
    document.getElementById("to").value;

  output.value = "번역중...";
  status.innerText = "번역중...";

  try{

    const url =
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair="
      + from
      + "|"
      + to;

    const response =
      await fetch(url);

    const data =
      await response.json();

    output.value =
      data.responseData.translatedText;

    status.innerText =
      "번역 완료";

  }catch(error){

    console.log(error);

    output.value =
      "번역 실패";

    status.innerText =
      "서버 오류";
  }
}

function copyText(){

  const text =
    document.getElementById("output");

  navigator.clipboard.writeText(
    text.value
  );

  alert("복사 완료");
}

</script>

</body>
</html>
