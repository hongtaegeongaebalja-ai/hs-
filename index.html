<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#fff;
  color:#111;
}

header{
  height:75px;
  border-bottom:2px solid #eee;
  display:flex;
  align-items:center;

.logo{

.wrap{

  font-size:50px;

.sub{

.boxes{
  display:grid;
  grid-template-columns:1fr auto 1fr;

  align-items:center;
}

.box{

.middle{

  height:90px;
  border:none;

.btn{

  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.translate{

.copy{
  background:#333;
  color:white;
}

.info{
  margin-top:30px;
  border:2px solid #ddd;
  border-radius:20px;
  padding:25px;
  line-height:1.8;
}

.info h2{
  margin-bottom:15px;
}

.open-btn{
  margin-top:20px;
  width:100%;
  padding:20px;
  border:none;
  border-radius:16px;
  background:#111;
  color:white;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.status{
  margin-top:20px;
  color:#666;
}

@media(max-width:1000px){

  .boxes{
    grid-template-columns:1fr;
  }

  .middle{
    transform:rotate(90deg);
  }

  textarea{
    height:250px;
  }

</head>

<body>

<header>

<div class="logo">
hs번역웹
</div>

</header>

<div class="wrap">

<div class="title">
hs번역웹
</div>

<div class="sub">
무료 AI 번역 웹사이트
</div>

<div class="boxes">

<!-- 입력 -->
<div class="box">

<select id="from">

<option value="ko">한국어</option>
<option value="en">영어</option>
<option value="ja">일본어</option>
<option value="zh-CN">중국어</option>
<option value="fr">프랑스어</option>

</select>

<textarea
id="input"
placeholder="번역할 내용을 입력하세요"
></textarea>

</div>

<!-- 가운데 -->
<div class="middle">

<button
class="swap"
onclick="swapLang()"
>
⇄
</button>

</div>

<!-- 결과 -->
<div class="box">

<select id="to">

<option value="en">영어</option>
<option value="ko">한국어</option>
<option value="ja">일본어</option>
<option value="zh-CN">중국어</option>
<option value="fr">프랑스어</option>

</select>

<textarea
id="output"
readonly
placeholder="번역 결과"
></textarea>

</div>

</div>

<div class="buttons">

<button
class="btn translate"
onclick="translateText()"
>
번역하기
</button>

<button
class="btn copy"
onclick="copyText()"
>
복사하기
</button>

</div>

<div
class="status"
id="status"
>
준비 완료
</div>

<!-- 광고 심사용 정보 -->
<div class="info">

<h2>hs번역웹 소개</h2>

<p>

hs번역웹은 다양한 언어를 쉽고 빠르게 번역할 수 있는 무료 AI 번역 웹사이트입니다.
한국어, 영어, 일본어, 중국어 등 여러 언어를 지원하며 모바일과 태블릿, PC 환경에서 모두 사용할 수 있습니다.

</p>

<br>

<p>

본 웹사이트는 사용자의 편리한 번역 기능 제공을 목적으로 제작되었습니다.
불법 콘텐츠 및 유해한 기능을 제공하지 않으며 누구나 자유롭게 사용할 수 있습니다.

</p>

<br>

<p>

<button
class="open-btn"
onclick="openInfoPage()"
>
사이트 정보 보기
</button>

</div>

</div>

<script>

function swapLang(){

  const from =
    document.getElementById("from");

  const to =
    document.getElementById("to");

  let temp = from.value;

  from.value = to.value;
  to.value = temp;
}

async function translateText(){

  const text =
    document.getElementById("input").value;

  const output =
    document.getElementById("output");

  const status =
    document.getElementById("status");

  if(text.trim() === ""){

    alert("내용 입력");
    return;
  }

  const from =
    document.getElementById("from").value;

  const to =
    document.getElementById("to").value;

  output.value = "번역중...";
  status.innerText = "번역중...";

  try{

    const url =
      "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(text)
      + "&langpair="
      + from
      + "|"
      + to;

    const response =
      await fetch(url);

    const data =
      await response.json();

    output.value =
      data.responseData.translatedText;

    status.innerText =
      "번역 완료";

  }catch(error){

    console.log(error);

    output.value =
      "번역 실패";

    status.innerText =
      "서버 오류";
  }
}

function copyText(){

  const text =
    document.getElementById("output");

  navigator.clipboard.writeText(
    text.value
  );

  alert("복사 완료");
}
