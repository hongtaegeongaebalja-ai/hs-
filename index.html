<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>hs번역웹</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#fff;
  color:#111;
}

header{
  width:100%;
  height:75px;
  border-bottom:2px solid #e5e5e5;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:white;
}

.logo{
  font-size:32px;
  font-weight:900;
  color:#00c73c;
}

.wrap{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:25px;
}

.title{
  font-size:50px;
  font-weight:900;
  margin-bottom:10px;
}

.sub{
  color:#666;
  margin-bottom:30px;
  font-size:18px;
}

.boxes{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:20px;
  align-items:center;
}

.box{
  border:2px solid #ddd;
  background:white;
  min-height:500px;
  padding:20px;
  border-radius:18px;
}

.top{
  margin-bottom:20px;
}

select{
  width:100%;
  padding:16px;
  border:2px solid #ddd;
  background:#f8f8f8;
  font-size:17px;
  font-weight:bold;
  border-radius:12px;
  outline:none;
}

textarea{
  width:100%;
  height:380px;
  border:none;
  outline:none;
  resize:none;
  font-size:22px;
  line-height:1.6;
}

.middle{
  display:flex;
  justify-content:center;
  align-items:center;
}

.swap{
  width:90px;
  height:90px;
  border:none;
  border-radius:50%;
  background:#00c73c;
  color:white;
  font-size:40px;
  cursor:pointer;
}

.buttons{
  margin-top:25px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  min-width:200px;
  padding:18px;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.translate{
  background:#00c73c;
  color:white;
}

.copy{
  background:#111;
  color:white;
}

.site{
  margin-top:25px;
  border:2px solid #ddd;
  background:#f8f8f8;
  padding:18px;
  border-radius:14px;
  font-size:16px;
  word-break:break-all;
}

.status{
  margin-top:15px;
  font-size:15px;
  color:#666;
}

@media(max-width:1000px){

  .boxes{
    grid-template-columns:1fr;
  }

  .middle{
    transform:rotate(90deg);
  }

  textarea{
    height:250px;
  }
}

@media(max-width:600px){

  .wrap{
    padding:15px;
  }

  .title{
    font-size:35px;
  }

  textarea{
    font-size:18px;
  }

  .btn{
    width:100%;
    flex:none;
  }

  .swap{
    width:75px;
    height:75px;
    font-size:30px;
  }
}

</style>
</head>

<body>

<header>

<div class="logo">
hs번역웹
</div>

</header>

<div class="wrap">

<div class="title">
hs번역웹
</div>

<div class="sub">
무료 AI 번역 웹사이트
</div>

<div class="boxes">

<!-- 입력 -->
<div class="box">

<div class="top">

<select id="from">
<option value="ko">🇰🇷 한국어</option>
<option value="en">🇺🇸 영어</option>
<option value="ja">🇯🇵 일본어</option>
<option value="zh">🇨🇳 중국어</option>
<option value="fr">🇫🇷 프랑스어</option>
<option value="de">🇩🇪 독일어</option>
<option value="es">🇪🇸 스페인어</option>
<option value="ru">🇷🇺 러시아어</option>
<option value="it">🇮🇹 이탈리아어</option>
<option value="th">🇹🇭 태국어</option>
</select>

</div>

<textarea
id="input"
placeholder="번역할 내용을 입력하세요"
></textarea>

</div>

<!-- 가운데 -->
<div class="middle">

<button
class="swap"
onclick="swapLang()"
>
⇄
</button>

</div>

<!-- 결과 -->
<div class="box">

<div class="top">

<select id="to">
<option value="en">🇺🇸 영어</option>
<option value="ko">🇰🇷 한국어</option>
<option value="ja">🇯🇵 일본어</option>
<option value="zh">🇨🇳 중국어</option>
<option value="fr">🇫🇷 프랑스어</option>
<option value="de">🇩🇪 독일어</option>
<option value="es">🇪🇸 스페인어</option>
<option value="ru">🇷🇺 러시아어</option>
<option value="it">🇮🇹 이탈리아어</option>
<option value="th">🇹🇭 태국어</option>
</select>

</div>

<textarea
id="output"
readonly
placeholder="번역 결과가 표시됩니다"
></textarea>

</div>

</div>

<div class="buttons">

<button
class="btn translate"
onclick="translateText()"
>
번역하기
</button>

<button
class="btn copy"
onclick="copyText()"
>
복사하기
</button>

</div>

<div class="status" id="status">
준비 완료
</div>

<div class="site">

🌐 내 웹사이트 주소<br><br>

https://hongtaegeongaebalja.github.io/hs-/

</div>

</div>

<script>

// 무료 서버들이 자꾸 막혀서
// 서버 없이 동작하는 방식으로 수정

const miniDictionary = {

  "안녕":"hello",
  "사랑해":"i love you",
  "감사합니다":"thank you",
  "고마워":"thanks",
  "이름":"name",
  "학교":"school",
  "학생":"student",
  "음식":"food",
  "물":"water",
  "한국":"korea",
  "일본":"japan",
  "중국":"china",
  "영어":"english",
  "고양이":"cat",
  "강아지":"dog",
  "사과":"apple",
  "바나나":"banana",
  "오늘":"today",
  "내일":"tomorrow",

  "hello":"안녕",
  "thank you":"감사합니다",
  "thanks":"고마워",
  "school":"학교",
  "student":"학생",
  "food":"음식",
  "water":"물",
  "cat":"고양이",
  "dog":"강아지",
  "apple":"사과",
  "banana":"바나나",
  "today":"오늘",
  "tomorrow":"내일"

};

function swapLang(){

  const from =
    document.getElementById("from");

  const to =
    document.getElementById("to");

  const temp = from.value;

  from.value = to.value;
  to.value = temp;

  const input =
    document.getElementById("input");

  const output =
    document.getElementById("output");

  const tempText = input.value;

  input.value = output.value;
  output.value = tempText;
}

function translateText(){

  const input =
    document.getElementById("input").value
    .trim();

  const output =
    document.getElementById("output");

  const status =
    document.getElementById("status");

  if(input === ""){

    alert("내용 입력");
    return;
  }

  status.innerText = "번역중...";

  const lower =
    input.toLowerCase();

  if(miniDictionary[lower]){

    output.value =
      miniDictionary[lower];

  }else{

    output.value =
      "번역 데이터 없음\n\n입력한 내용:\n" + input;
  }

  status.innerText =
    "번역 완료";
}

function copyText(){

  const text =
    document.getElementById("output").value;

  if(text.trim() === ""){

    alert("복사할 내용 없음");
    return;
  }

  navigator.clipboard.writeText(text);

  alert("복사 완료");
}

</script>

</body>
</html>
