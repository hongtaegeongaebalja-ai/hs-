<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>hs번역웹</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:white;
}

header{
  height:70px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#00c73c;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.boxes{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.box{
  flex:1;
  border:1px solid #ddd;
  border-radius:20px;
  padding:20px;
}

textarea{
  width:100%;
  height:300px;
  border:none;
  outline:none;
  resize:none;
  font-size:20px;
}

button{
  background:#00c73c;
  color:white;
  border:none;
  padding:15px 25px;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
}

.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}

@media(max-width:900px){

  .boxes{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<header>

<div class="logo">
hs번역웹
</div>

</header>

<div class="wrap">

<h1>hs번역웹</h1>

<div class="boxes">

<div class="box">

<select id="from">
<option>한국어</option>
<option>영어</option>
<option>일본어</option>
</select>

<br><br>

<textarea
id="input"
placeholder="번역할 내용 입력"
></textarea>

</div>

<div class="box">

<select id="to">
<option>영어</option>
<option>한국어</option>
<option>일본어</option>
</select>

<br><br>

<textarea
id="output"
readonly
placeholder="번역 결과"
></textarea>

</div>

</div>

<div class="buttons">

<button onclick="translateText()">
번역하기
</button>

<button onclick="copyText()">
복사하기
</button>

</div>

</div>

<script>

function translateText(){

  var input =
    document.getElementById("input").value;

  var output =
    document.getElementById("output");

  if(input === ""){

    alert("내용 입력");

    return;
  }

  output.value = "번역중...";

  setTimeout(function(){

    output.value =
      "번역 결과:\n\n" + input;

  },500);
}

function copyText(){

  var text =
    document.getElementById("output");

  text.select();

  document.execCommand("copy");

  alert("복사 완료");
}

</script>

</body>
</html>
